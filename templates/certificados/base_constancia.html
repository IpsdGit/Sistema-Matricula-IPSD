<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        @page {
            size: letter portrait;
            margin: 0;
        }
        body {
            margin: 0;
            padding: 0;
            position: relative;
            font-family: Arial, sans-serif;
            color: #0f172a;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .sheet {
            width: 100%;
            height: 100%;
            padding: 48px;
            box-sizing: border-box;
            background: #ffffff;
        }

        .frame {
            position: relative;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            border: 5px solid #0b2e6d;
            outline: 2px solid #f2b705;
            outline-offset: -14px;
            padding: 44px 52px;
        }

        .titulo {
            text-align: center;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 40px;
            letter-spacing: 0.22em;
            color: #0b2e6d;
            margin-top: 8px;
        }

        .subtitulo {
            text-align: center;
            font-size: 12px;
            letter-spacing: 0.18em;
            color: #334155;
            margin-top: 8px;
        }

        .texto {
            margin-top: 34px;
            font-size: 14px;
            line-height: 1.7;
            text-align: justify;
        }

        .firma {
            position: absolute;
            left: 52px;
            right: 52px;
            bottom: 42px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            justify-items: center;
        }

        .firma img {
            max-width: 260px;
            max-height: 90px;
        }

        .firma .nombre {
            font-weight: 700;
            font-size: 13px;
            text-align: center;
        }

        .firma .cargo {
            font-size: 12px;
            color: #475569;
            text-align: center;
            margin-top: -2px;
        }
    </style>
</head>
<body>
    <div class="sheet">
        <div class="frame">
            <div class="titulo">CONSTANCIA</div>
            <div class="subtitulo">DE PARTICIPACIÓN</div>

            <div class="texto">{{ texto_certificado_renderizado|safe }}</div>

            <div class="firma">
                <img src="file:///{{ ruta_firma_absoluta }}" alt="Firma">
                <div class="nombre">{{ firmante_nombre }}</div>
                <div class="cargo">{{ firmante_cargo }}</div>
            </div>
        </div>
    </div>
</body>
</html>
