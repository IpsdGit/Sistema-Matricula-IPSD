<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        @page {
            size: letter portrait;
            margin: 0;
        }
        html, body {
            width: 8.5in;
            height: 11in;
        }
        body {
            margin: 0;
            padding: 0;
            position: relative;
            font-family: Arial, sans-serif;
            color: #0f172a;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .sheet {
            position: relative;
            width: 8.5in;
            height: 11in;
            padding: 0;
            box-sizing: border-box;
            background-color: transparent;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
        }

        .frame {
            position: relative;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 60px 72px;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        .logo-superior {
            width: 100%;
            text-align: center;
            margin-bottom: 18px;
        }

        .logo-superior img {
            max-height: 70px;
            max-width: 360px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }

        .titulo {
            text-align: center;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 40px;
            letter-spacing: 0.22em;
            color: #0b2e6d;
            margin-top: 8px;
        }

        .subtitulo {
            text-align: center;
            font-size: 12px;
            letter-spacing: 0.18em;
            color: #334155;
            margin-top: 8px;
        }

        .contenido {
            margin-top: 40px; 
            display: block;
            text-align: center;
        }

        .texto {
            display: inline-block;
            margin: auto 0;
            width: 86%;
            font-size: 18px;
            line-height: 1.8;
            text-align: left;
        }

        .firma {
            position: absolute;
            bottom: 155px;
            left: 0;
            width: 100%;
            text-align: center;
                                                 /*position: relative;
                                                 display: grid;
                                                  grid-template-columns: 1fr;
                                                  gap: 10px;
                                                  justify-items: center;
                                                  margin-top: 18px;*/
        }

        .firma img {
            max-width: 260px;
            max-height: 90px;
            object-fit: contain;
            display: block;
            margin: 0 auto -15px; /* Empuja un poquito la firma hacia abajo para que toque la línea */
            position: relative;
            z-index: 10;
                                                                /*max-width: 260px;
                                                                  max-height: 90px;
                                                                  display: block;*/
        }

        .firma .linea-firma {
            width: 320px; 
            height: 2px;
            background: #0b2e6d;
            margin: 0 auto 6px auto;
             /* width: 360px;
               height: 1px;
              background: #1f2937;
              margin: 0 auto 6px;*/
        }

        .firma .nombre {
            font-weight: 700;
            font-size: 13px;
            text-align: center;
            color: #0f172a;
        }

        .firma .cargo {
            font-size: 12px;
            color: #475569;
            text-align: center;
            margin-top: -2px;
        }

        /* QR de validación */
        .validador-qr {
            position: absolute;
            bottom: 32px;
            right: 55px;
            text-align: center;
            z-index: 20;
        }

        .validador-qr img {
            width: 72px;
            height: 72px;
            display: block;
            margin: 0 auto;
        }

        .validador-qr .qr-token {
            font-size: 6.5px;
            color: #64748b;
            margin-top: 3px;
            font-family: 'Courier New', monospace;
            letter-spacing: .03em;
            word-break: break-all;
            max-width: 72px;
        }

        .validador-qr .qr-label {
            font-size: 6px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="sheet" style="background-image: url('{{ ruta_fondo_src }}');">
        <div class="frame">
            {% if ruta_logo_src %}
            <div class="logo-superior">
                <img src="{{ ruta_logo_src }}" alt="Logo Superior">
            </div>
            {% endif %}
            <div class="titulo">CONSTANCIA</div>
            <div class="subtitulo">DE PARTICIPACIÓN</div>

            <div class="contenido">
                <div class="texto">{{ texto_certificado_renderizado|safe }}</div>
            </div>

            <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                <tr>
                    <td style="width: 25%; text-align: center; vertical-align: bottom; padding-left: 20px;">
                        <div style="background-color: white; padding: 6px; border-radius: 6px; display: inline-block;">
                            <img src="{{ qr_base64|safe }}" style="width: 75px; height: 75px; display: block; margin: 0 auto;" alt="QR">
                            <div style="font-size: 9px; color: #0b2e6d; margin-top: 4px; font-weight: bold; font-family: Arial, sans-serif;">{{ token_certificado }}</div>
                            <div style="font-size: 7px; color: #475569; font-family: Arial, sans-serif;">Escanee para validar</div>
                        </div>
                    </td>
                    <td style="width: 50%; text-align: center; vertical-align: bottom;">
                        <div class="firma" style="position: relative; bottom: auto; left: auto; width: auto; margin-top: 0;">
                            <img src="{{ ruta_firma_src }}" alt="Firma">
                            <div class="linea-firma"></div>
                            <div class="nombre">{{ firmante_nombre }}</div>
                            <div class="cargo">{{ firmante_cargo }}</div>
                        </div>
                    </td>
                    <td style="width: 25%;"></td>
                </tr>
            </table>
        </div>
    </div>
</body>
</html>
