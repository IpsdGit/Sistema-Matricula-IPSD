<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        @page {
            size: letter landscape;
            margin: 0;
        }
        html, body {
            width: 11in;
            height: 8.5in;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            color: #0f172a;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .sheet {
            position: relative;
            width: 11in;
            height: 8.5in;
            padding: 0;
            box-sizing: border-box;
            background-color: transparent;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
        }

        .frame {
            position: relative;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 40px 58px;
            display: flex;
            flex-direction: column;
            z-index: 2;
        }

        .header {
            text-align: center;
            margin-top: 6px;
        }

        .logo-superior {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        .logo-superior img {
            max-height: 85px;
            max-width: 400px;
            object-fit: contain;
        }

        .header .titulo {
            margin: 18px 0 0;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 64px;
            letter-spacing: 0.06em;
            color: #0b2e6d;
        }

        .header .subtitulo {
            margin-top: 2px;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 18px;
            letter-spacing: 0.28em;
            color: #0b2e6d;
        }

        .contenido {
            margin-top: 24px;
            text-align: center;
            flex-grow: 1; /* Permite empujar la firma hacia abajo */
        }

        .contenido .intro {
            font-size: 14px;
            letter-spacing: 0.08em;
            color: #334155;
        }

        .contenido .nombre {
            margin-top: 18px;
            font-size: 30px;
            font-weight: 700;
            color: #0b2e6d;
        }

        .contenido .linea {
            margin: 14px auto 0;
            width: 72%;
            height: 2px;
            background: #0b2e6d;
        }

        .contenido .texto {
            margin: 22px auto 0;
            width: 86%;
            font-size: 18px;
            line-height: 1.7;
            color: #0f172a;
        }

        .firma {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin-top: 20px;
            width: 100%;
        }

        .firma .contenedor-firma {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            width: 100%;
        }

        .firma .img {
            width: 100%;
            height: 120px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin-bottom: -22px; 
            z-index: 10;
        }

        .firma .img img {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .firma .meta {
            text-align: center;
            width: 100%;
            min-width: 320px;
            position: relative;
        }

        .firma .meta .linea-firma {
            width: 280px;
            height: 2px;
            background: #1f2937;
            margin: 0 auto 8px auto;
        }

        .firma .meta .nombre-firmante {
            font-weight: 700;
            font-size: 14px;
        }

        .firma .meta .cargo-firmante {
            font-size: 12px;
            color: #475569;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="sheet" style="background-image: url('{{ ruta_fondo_src }}');">

        <div class="frame">
            <div class="header">
                {% if ruta_logo_src %}
                <div class="logo-superior">
                    <img src="{{ ruta_logo_src }}" alt="Logo Superior">
                </div>
                {% endif %}
                <div class="titulo">DIPLOMA</div>
                <div class="subtitulo">DE PARTICIPACIÓN</div>
            </div>

            <div class="contenido">
                <div class="intro">SE OTORGA EL PRESENTE A</div>
                <div class="nombre">{{ nombre_docente }}</div>
                <div class="linea"></div>

                <div class="texto">{{ texto_certificado_renderizado|safe }}</div>
            </div>

            <div class="firma">
                <div class="contenedor-firma">
                    <div class="img">
                        <img src="{{ ruta_firma_src }}" alt="Firma y Sello">
                    </div>
                    <div class="meta">
                        <div class="linea-firma"></div>
                        <div class="nombre-firmante">{{ firmante_nombre }}</div>
                        <div class="cargo-firmante">{{ firmante_cargo }}</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
