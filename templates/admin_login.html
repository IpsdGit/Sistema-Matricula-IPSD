{% extends "base.html" %}

{% block title %}IPSD – Login Administrador{% endblock %}

{% block content %}
<div class="admin-login-bg">
  <div class="admin-login-card animate-fade-up">
    <div style="text-align:center; margin-bottom:2rem;">
      <div style="width:72px; height:72px; background:linear-gradient(135deg,#7c3aed,#2563eb); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:2rem; margin:0 auto 1rem; box-shadow:0 8px 24px rgba(124,58,237,.4);">
        🔐
      </div>
      <h2 style="color:#fff; margin:0 0 .3rem; font-size:1.4rem;">Panel de Administración</h2>
      <p style="color:#64748b; margin:0; font-size:.875rem;">Acceso restringido – IPSD UNAH</p>
    </div>

    {% if error %}
    <div class="alert-ipsd danger" style="margin-bottom:1.2rem;">
      <span>⛔</span>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <form action="/login_admin" method="POST" id="admin-login-form">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label class="form-label" for="username">Usuario</label>
        <input
          type="text"
          class="form-input"
          id="username"
          name="username"
          placeholder="Nombre de usuario"
          autocomplete="username"
          required
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <div style="position:relative;">
          <input
            type="password"
            class="form-input"
            id="password"
            name="password"
            placeholder="••••••••••"
            autocomplete="current-password"
            required
            style="padding-right:2.8rem;"
          >
          <button type="button" id="toggle-pwd" onclick="togglePassword()"
            style="position:absolute; right:.9rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:#64748b; font-size:1rem; padding:0; transition:color .2s;"
            title="Mostrar/ocultar contraseña">
            👁️
          </button>
        </div>
      </div>

      <button type="submit" class="btn-primary-ipsd w-full" id="login-btn"
        style="justify-content:center; width:100%; background:linear-gradient(135deg,#7c3aed,#2563eb); box-shadow:0 4px 14px rgba(124,58,237,.4); margin-top:.5rem;">
        Ingresar al Panel
      </button>
    </form>

    <div style="margin-top:1.5rem; text-align:center;">
      <a href="/" style="color:#475569; font-size:.8rem; text-decoration:none; transition:color .2s;"
         onmouseover="this.style.color='#93c5fd'" onmouseout="this.style.color='#475569'">
        ← Volver al Portal Docente
      </a>
    </div>
  </div>
</div>

<script>
function togglePassword() {
  const field = document.getElementById('password');
  const btn   = document.getElementById('toggle-pwd');
  if (field.type === 'password') {
    field.type = 'text';
    btn.textContent = '🙈';
  } else {
    field.type = 'password';
    btn.textContent = '👁️';
  }
}
</script>
{% endblock %}
